<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Memory Match — Crazy Game Online</title>
  <meta name="description" content="Play Memory Match online! Flip cards and find matching pairs. Free brain game for kids."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .mem-grid { display:grid; gap:10px; padding:16px; max-width:460px; margin:0 auto; }
    .mem-grid.g4 { grid-template-columns:repeat(4,1fr); }
    .mem-grid.g6 { grid-template-columns:repeat(6,1fr); }
    .card-wrap { perspective:600px; aspect-ratio:1; cursor:pointer; }
    .card-inner { width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.4s; }
    .card-wrap.flipped .card-inner { transform:rotateY(180deg); }
    .card-wrap.matched .card-inner { transform:rotateY(180deg); }
    .card-wrap.matched .card-front { background:rgba(46,213,115,0.2);border-color:var(--secondary); }
    .card-front,.card-back { position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:2px solid var(--card-border);transition:border-color 0.3s; }
    .card-front { transform:rotateY(180deg);background:var(--dark3); }
    .card-back  { background:var(--card-bg); font-size:1.4rem; }
  </style>
</head>
<body>

<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🃏 Memory Match</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🃏 Memory Match</h1>
      <div class="game-controls-bar">
        <button class="btn btn-primary" id="btn-new">🔄 New Game</button>
      </div>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="score-label">Moves</span><span class="score-value" id="moves">0</span></div>
      <div class="score-item"><span class="score-label">Pairs</span><span class="score-value" id="pairs">0</span></div>
      <div class="score-item"><span class="score-label">Time</span><span class="score-value" id="timer">0:00</span></div>
      <div class="score-item" style="margin-left:auto;">
        <div class="difficulty-btns">
          <button class="diff-btn active" data-size="4">4×4</button>
          <button class="diff-btn" data-size="6">6×6</button>
        </div>
      </div>
    </div>
    <div class="game-canvas-wrap">
      <div class="mem-grid g4" id="mem-grid"></div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🎮 How to Play</h3>
      <p>Click any card to flip it. Find the matching pair! All pairs matched = you win 🎉</p>
    </div>
    <div class="info-card">
      <h3>⭐ Tips</h3>
      <p>Try to remember where you saw each emoji. Start from corners and work inward!</p>
    </div>
    <div class="info-card">
      <h3>🏆 Best (4×4)</h3>
      <p style="font-family:'Fredoka One',cursive;font-size:1.6rem;color:var(--accent);text-align:center;" id="hs-display">-- moves</p>
    </div>
  </div>
</div>

<script>
const EMOJIS_16 = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧'];
const EMOJIS_36 = [...EMOJIS_16,'🐦','🐝','🐛','🦋','🐌','🐞','🦀','🦑','🐙','🦈','🐬','🐳','🦓','🦒','🦘','🦔','🐿️','🦡'];

let size = 4, moves = 0, pairs = 0, flipped = [], locked = false, timerID, seconds = 0, started = false;
const LS = 'cgo_hs_memory4';
const getHS = () => localStorage.getItem(LS) || '--';
const setHS = v => { const c = getHS(); if(c==='--'||v<parseInt(c)) localStorage.setItem(LS,v); };

function newGame() {
  clearInterval(timerID); moves=0; pairs=0; flipped=[]; locked=false; seconds=0; started=false;
  const pool = (size===4?EMOJIS_16:EMOJIS_36).slice(0,(size*size)/2);
  const cards = shuffle([...pool,...pool]);
  const grid  = document.getElementById('mem-grid');
  grid.className = `mem-grid g${size}`;
  grid.innerHTML = cards.map((e,i)=>`
    <div class="card-wrap" data-idx="${i}" data-emoji="${e}">
      <div class="card-inner">
        <div class="card-back">🎴</div>
        <div class="card-front">${e}</div>
      </div>
    </div>`).join('');
  grid.querySelectorAll('.card-wrap').forEach(c=>c.addEventListener('click',onCard));
  updateUI();
  document.getElementById('hs-display').textContent = getHS()==='--' ? '-- moves' : getHS()+' moves';
}

function onCard(e) {
  const card = e.currentTarget;
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;
  if (!started) { started=true; timerID=setInterval(()=>{seconds++;updateTimer();},1000); }
  card.classList.add('flipped');
  flipped.push(card);
  if (flipped.length === 2) {
    moves++;
    locked = true;
    if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
      flipped.forEach(c=>c.classList.add('matched'));
      pairs++;
      flipped=[]; locked=false;
      updateUI();
      if (pairs === (size*size)/2) winGame();
    } else {
      setTimeout(()=>{ flipped.forEach(c=>c.classList.remove('flipped')); flipped=[]; locked=false; }, 1000);
    }
    updateUI();
  }
}

function winGame() {
  clearInterval(timerID);
  if(size===4) setHS(moves);
  setTimeout(()=>{
    document.getElementById('mem-grid').insertAdjacentHTML('beforebegin',
      `<div style="text-align:center;padding:20px;animation:fadeIn 0.4s ease">
        <div style="font-size:3rem">🎉</div>
        <div style="font-family:'Fredoka One',cursive;font-size:1.6rem;margin:8px 0">You Win!</div>
        <div style="color:var(--text-muted)">${moves} moves · ${formatTime(seconds)}</div>
        <button class="btn btn-primary" style="margin-top:12px" onclick="this.parentElement.remove();newGame()">▶ Play Again</button>
      </div>`);
  },400);
}

function updateTimer() { document.getElementById('timer').textContent = formatTime(seconds); }
function formatTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function updateUI() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = `${pairs}/${(size*size)/2}`;
}
function shuffle(a) { for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a; }

document.querySelectorAll('[data-size]').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('[data-size]').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    size=parseInt(b.dataset.size);
    newGame();
  });
});
document.getElementById('btn-new').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
