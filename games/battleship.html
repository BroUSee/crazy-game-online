  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Battleship — Crazy Game Online</title>
  <meta name="description" content="Play Battleship! Place your fleet and sink enemy ships. Classic 2-player strategy game."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .bs-board-wrap { overflow-x: auto; padding: 8px; }

    .bs-labels { display: grid; grid-template-columns: 28px repeat(10,1fr); gap: 3px; max-width: 360px; margin: 0 auto 2px; }
    .bs-labels span { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-align: center; }

    .bs-row { display: flex; align-items: center; gap: 3px; max-width: 360px; margin: 0 auto; margin-bottom: 3px; }
    .bs-row-label { width: 28px; font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-align: center; flex-shrink: 0; }

    .bs-grid { display: grid; grid-template-columns: repeat(10,1fr); gap: 3px; flex: 1; }

    .bs-cell {
      aspect-ratio: 1;
      border-radius: 5px;
      border: 1.5px solid rgba(108,99,255,0.2);
      background: rgba(219,234,254,0.4);
      cursor: pointer;
      transition: all 0.15s;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem;
      min-width: 0;
    }

    .bs-cell:hover:not(.hit):not(.miss):not(.sunk) {
      border-color: var(--primary);
      background: rgba(108,99,255,0.15);
      transform: scale(1.1);
    }

    .bs-cell.ship    { background: rgba(16,185,129,0.25); border-color: var(--green); }
    .bs-cell.preview { background: rgba(16,185,129,0.3); border-color: var(--green); }
    .bs-cell.invalid { background: rgba(239,68,68,0.2);  border-color: var(--red); }
    .bs-cell.hit     { background: var(--red); border-color: #b91c1c; cursor: default; }
    .bs-cell.miss    { background: rgba(100,116,139,0.3); border-color: #94a3b8; cursor: default; }
    .bs-cell.sunk    { background: #7f1d1d; border-color: #991b1b; cursor: default; }

    .ship-list { display: flex; flex-direction: column; gap: 8px; }

    .ship-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 12px; border-radius: 10px;
      border: 1.5px solid var(--border-hard);
      background: rgba(255,255,255,0.7);
      cursor: pointer; transition: all 0.2s;
    }

    .ship-item:hover:not(.placed) { border-color: var(--primary); background: var(--primary-light); }
    .ship-item.selected    { border-color: var(--primary); background: var(--primary-light); box-shadow: 0 2px 8px rgba(108,99,255,0.2); }
    .ship-item.placed      { opacity: 0.45; cursor: default; }

    .ship-squares { display: flex; gap: 3px; }
    .ship-sq { width: 12px; height: 12px; background: var(--green); border-radius: 3px; border: 1px solid #059669; }

    .phase-banner {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white; padding: 10px 20px; text-align: center;
      font-family: 'Sora', sans-serif; font-weight: 700; font-size: 0.95rem;
    }

    .handoff-screen {
      position: fixed; inset: 0; background: rgba(15,23,42,0.96);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 500; padding: 24px;
    }

    .handoff-screen h2 { font-family:'Sora',sans-serif; font-size: 1.8rem; color: white; text-align: center; }
    .handoff-screen p  { color: #94a3b8; text-align: center; font-size: 0.95rem; }
  </style>

  {
    "@context": "https://schema.org",

    "name": "Battleship",

    "numberOfPlayers": {
      "@type": "QuantitativeValue",

    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },

    }
  }

<body>

<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🚢 Battleship</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🚢 Battleship</h1>
      <div class="game-controls-bar">
        <button class="btn btn-secondary" id="btn-rotate">↻ Rotate</button>
        <button class="btn btn-primary" id="btn-action" style="display:none">✅ Ready!</button>
      </div>
    </div>

    <div class="phase-banner" id="phase-banner">🚢 Player 1 — Place your ships</div>

    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">Turn</span>
        <span class="score-value" id="turn-label">Player 1</span>
      </div>
      <div class="score-item">
        <span class="score-label">Phase</span>
        <span class="score-value" id="phase-label">Placement</span>
      </div>
      <div class="score-item">
        <span class="score-label">Hits</span>
        <span class="score-value" id="hits" style="color:var(--red)">0</span>
      </div>
    </div>

    <div class="game-canvas-wrap" style="padding:16px;align-items:center;justify-content:center;">
      <div class="bs-board-wrap" id="board-wrap">
        <!-- Rendered by JS -->
      </div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3 id="panel-title">🚢 Your Fleet</h3>
      <div class="ship-list" id="ship-list"></div>
    </div>
    <div class="info-card">
      <h3>📋 How to Play</h3>
      <p>Place your ships, then take turns firing at the enemy grid. First to sink all ships wins!</p>
    </div>
    <div class="info-card" id="legend-card">
      <h3>🗺️ Legend</h3>
      <ul>
        <li><span style="color:var(--green)">■</span> Your ship</li>
        <li><span style="color:var(--red)">■</span> Hit 💥</li>
        <li><span style="color:#94a3b8">■</span> Miss •</li>
      </ul>
    </div>
  </div>
</div>

<script>
const SHIPS = [
  { name:'Carrier',    size:5, emoji:'🛸' },
  { name:'Battleship', size:4, emoji:'🚢' },
  { name:'Cruiser',    size:3, emoji:'🚤' },
  { name:'Submarine',  size:3, emoji:'🤿' },
  { name:'Destroyer',  size:2, emoji:'⛵' },
];
const COLS_LBL = 'ABCDEFGHIJ'.split('');

let players, currentPlayer, phase, shipIdx, horizontal;

function createPlayer() {
  return {
    grid:   Array.from({length:10}, () => Array(10).fill(null)),
    shots:  Array.from({length:10}, () => Array(10).fill(false)),
    placed: {},
    hits:   0,
  };
}

function init() {
  players       = [createPlayer(), createPlayer()];
  currentPlayer = 0;
  phase         = 'place';
  shipIdx       = 0;
  horizontal    = true;
  renderShipList();
  renderBoard();
  updateUI();
  document.getElementById('btn-action').style.display = 'none';
}

/* ── RENDER BOARD ── */
function renderBoard() {
  const wrap = document.getElementById('board-wrap');
  const p    = players[currentPlayer];

  let html = '<div class="bs-labels"><span></span>' +
    COLS_LBL.map(c=>`<span>${c}</span>`).join('') + '</div>';

  for (let r = 0; r < 10; r++) {
    html += `<div class="bs-row"><div class="bs-row-label">${r+1}</div><div class="bs-grid" data-row="${r}">`;
    for (let c = 0; c < 10; c++) {
      let cls = 'bs-cell';
      if (phase === 'place') {
        if (p.grid[r][c] !== null) cls += ' ship';
      } else {
        // attack — show attacker's shots on defender's grid
        const attacker = players[currentPlayer];
        const defender = players[1 - currentPlayer];
        if (attacker.shots[r][c]) {
          cls += defender.grid[r][c] !== null ? ' hit' : ' miss';
        }
      }
      html += `<div class="${cls}" data-r="${r}" data-c="${c}"></div>`;
    }
    html += '</div></div>';
  }

  wrap.innerHTML = html;

  // Attach event listeners
  wrap.querySelectorAll('.bs-cell').forEach(cell => {
    const r = parseInt(cell.dataset.r);
    const c = parseInt(cell.dataset.c);
    cell.addEventListener('click',       () => phase==='place' ? placeShip(r,c) : fire(r,c));
    cell.addEventListener('mouseenter',  () => phase==='place' && showPreview(r,c));
    cell.addEventListener('mouseleave',  () => phase==='place' && clearPreview());
  });
}

/* ── CAN PLACE CHECK ── */
function canPlace(grid, r, c, size, h) {
  for (let i = 0; i < size; i++) {
    const nr = h ? r : r+i;
    const nc = h ? c+i : c;
    if (nr<0||nr>=10||nc<0||nc>=10) return false;
    if (grid[nr][nc] !== null) return false;
    // check adjacent cells (no touching ships)
    for (let dr=-1; dr<=1; dr++) for (let dc=-1; dc<=1; dc++) {
      const ar=nr+dr, ac=nc+dc;
      if (ar>=0&&ar<10&&ac>=0&&ac<10&&grid[ar][ac]!==null) return false;
    }
  }
  return true;
}

/* ── PREVIEW ── */
function showPreview(r, c) {
  if (players[currentPlayer].placed[shipIdx] !== undefined) return;
  clearPreview();
  const size = SHIPS[shipIdx].size;
  const ok   = canPlace(players[currentPlayer].grid, r, c, size, horizontal);
  for (let i = 0; i < size; i++) {
    const nr = horizontal ? r : r+i;
    const nc = horizontal ? c+i : c;
    const el = document.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
    if (el) el.classList.add(ok ? 'preview' : 'invalid');
  }
}

function clearPreview() {
  document.querySelectorAll('.preview,.invalid').forEach(el => el.classList.remove('preview','invalid'));
}

/* ── PLACE SHIP ── */
function placeShip(r, c) {
  const p    = players[currentPlayer];
  if (p.placed[shipIdx] !== undefined) return;
  const ship = SHIPS[shipIdx];
  if (!canPlace(p.grid, r, c, ship.size, horizontal)) return;

  // Place on grid
  for (let i = 0; i < ship.size; i++) {
    const nr = horizontal ? r : r+i;
    const nc = horizontal ? c+i : c;
    p.grid[nr][nc] = shipIdx;
  }
  p.placed[shipIdx] = { r, c, size: ship.size, h: horizontal };

  // Find next unplaced ship
  const next = SHIPS.findIndex((_, i) => p.placed[i] === undefined);
  if (next === -1) {
    // All ships placed
    shipIdx = 0;
    document.getElementById('btn-action').style.display = '';
  } else {
    shipIdx = next;
  }

  renderShipList();
  renderBoard();
}

/* ── RENDER SHIP LIST ── */
function renderShipList() {
  const p    = players[currentPlayer];
  const list = document.getElementById('ship-list');
  list.innerHTML = SHIPS.map((s, i) => {
    const isPlaced   = p.placed[i] !== undefined;
    const isSelected = i === shipIdx && !isPlaced;
    return `
      <div class="ship-item${isPlaced ? ' placed' : ''}${isSelected ? ' selected' : ''}" data-si="${i}">
        <span style="font-size:1.3rem">${s.emoji}</span>
        <span style="flex:1;font-weight:700;font-size:0.85rem">${s.name}</span>
        <div class="ship-squares">${Array(s.size).fill('<div class="ship-sq"></div>').join('')}</div>
        ${isPlaced ? '<span style="color:var(--green);font-size:0.8rem;font-weight:700">✓</span>' : ''}
      </div>`;
  }).join('');

  list.querySelectorAll('.ship-item:not(.placed)').forEach(el => {
    el.addEventListener('click', () => {
      shipIdx = parseInt(el.dataset.si);
      renderShipList();
    });
  });
}

/* ── FIRE ── */
function fire(r, c) {
  if (phase !== 'attack') return;
  const attacker = players[currentPlayer];
  const defender = players[1 - currentPlayer];
  if (attacker.shots[r][c]) return;

  attacker.shots[r][c] = true;

  if (defender.grid[r][c] !== null) {
    attacker.hits++;
    document.getElementById('hits').textContent = attacker.hits;

    // Check if all ship cells sunk
    const totalCells = SHIPS.reduce((a, s) => a + s.size, 0);
    if (attacker.hits >= totalCells) {
      endGame(); return;
    }
  }

  renderBoard();
  // Switch player
  currentPlayer = 1 - currentPlayer;
  document.getElementById('hits').textContent = players[currentPlayer].hits;
  showHandoff();
}

/* ── HANDOFF SCREEN ── */
function showHandoff() {
  const d = document.createElement('div');
  d.className = 'handoff-screen';
  d.innerHTML = `
    <div style="font-size:3rem">🫳</div>
    <h2>Hand to Player ${currentPlayer + 1}!</h2>
    <p>Don't let them see your board!</p>
    <button class="btn btn-primary" style="font-size:1rem;padding:12px 28px;" id="hs-ok">
      ✅ I'm Player ${currentPlayer + 1} — Show My Board
    </button>`;
  document.body.appendChild(d);
  document.getElementById('hs-ok').addEventListener('click', () => {
    d.remove();
    renderBoard();
    updateUI();
  });
}

/* ── END GAME ── */
function endGame() {
  phase = 'gameover';
  const d = document.createElement('div');
  d.className = 'handoff-screen';
  d.innerHTML = `
    <div style="font-size:3.5rem">🎉</div>
    <h2 style="color:var(--green)">Player ${currentPlayer + 1} Wins!</h2>
    <p>All enemy ships have been sunk!</p>
    <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:8px">
      <button class="btn btn-primary" onclick="location.reload()">▶ Play Again</button>
      <a href="../index.html" class="btn btn-secondary">← Games</a>
    </div>`;
  document.body.appendChild(d);
}

/* ── READY BUTTON ── */
document.getElementById('btn-action').addEventListener('click', () => {
  if (currentPlayer === 0) {
    // P1 done — handoff to P2
    const d = document.createElement('div');
    d.className = 'handoff-screen';
    d.innerHTML = `
      <div style="font-size:3rem">🫳</div>
      <h2>Hand to Player 2!</h2>
      <p>Don't let them see your board!</p>
      <button class="btn btn-primary" style="font-size:1rem;padding:12px 28px;" id="hs-ok">
        ✅ I'm Player 2 — Place My Ships
      </button>`;
    document.body.appendChild(d);
    document.getElementById('hs-ok').addEventListener('click', () => {
      d.remove();
      currentPlayer = 1; shipIdx = 0;
      document.getElementById('btn-action').style.display = 'none';
      renderShipList(); renderBoard(); updateUI();
    });
  } else {
    // Both placed — start battle
    phase = 'attack'; currentPlayer = 0;
    document.getElementById('btn-action').style.display = 'none';
    document.getElementById('btn-rotate').style.display = 'none';
    document.getElementById('panel-title').textContent = '🗺️ Attack!';
    document.getElementById('ship-list').innerHTML = '<p style="color:var(--text-muted);font-size:0.85rem;line-height:1.6">Click the enemy grid to fire. 💥 = Hit, • = Miss</p>';
    updateUI();
    showHandoff();
  }
});

document.getElementById('btn-rotate').addEventListener('click', () => {
  horizontal = !horizontal;
  document.getElementById('btn-rotate').textContent = horizontal ? '↻ Horizontal' : '↕ Vertical';
});

function updateUI() {
  const names = ['Player 1','Player 2'];
  document.getElementById('turn-label').textContent  = names[currentPlayer];
  document.getElementById('phase-label').textContent = phase === 'attack' ? 'Battle!' : 'Placement';
  document.getElementById('phase-banner').textContent =
    phase === 'attack'
      ? `💥 ${names[currentPlayer]} — Fire at the enemy!`
      : `🚢 ${names[currentPlayer]} — Place your ships`;
}

init();
</script>
</body>
</html>
