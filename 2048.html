<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>2048 — Crazy Game Online</title>
  <meta name="description" content="Play 2048 online! Slide tiles and merge numbers to reach 2048. Free addictive puzzle game."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔢</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .board { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; padding:16px; background:#1a1a2e; border-radius:12px; max-width:380px; margin:0 auto; }
    .tile { aspect-ratio:1; border-radius:10px; display:flex; align-items:center; justify-content:center; font-family:'Fredoka One',cursive; font-size:1.6rem; font-weight:900; transition:all 0.12s ease; }
    .t0    { background:#2d2d5e; color:transparent; }
    .t2    { background:#eee4da; color:#776e65; }
    .t4    { background:#ede0c8; color:#776e65; }
    .t8    { background:#f2b179; color:#fff; }
    .t16   { background:#f59563; color:#fff; }
    .t32   { background:#f67c5f; color:#fff; }
    .t64   { background:#f65e3b; color:#fff; font-size:1.4rem; }
    .t128  { background:#edcf72; color:#fff; font-size:1.2rem; }
    .t256  { background:#edcc61; color:#fff; font-size:1.1rem; }
    .t512  { background:#edc850; color:#fff; font-size:1rem; }
    .t1024 { background:#edc53f; color:#fff; font-size:0.9rem; }
    .t2048 { background:#edc22e; color:#fff; font-size:0.85rem; animation:pulse 0.5s ease; }
    .tnew  { animation: pop 0.15s ease; }
  </style>
</head>
<body>

<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🔢 2048</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🔢 2048</h1>
      <button class="btn btn-primary" id="btn-new">🔄 New Game</button>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="score-label">Score</span><span class="score-value" id="score">0</span></div>
      <div class="score-item"><span class="score-label">Best</span><span class="score-value" id="best">0</span></div>
    </div>
    <div class="game-canvas-wrap" style="flex-direction:column;gap:16px;">
      <div class="board" id="board"></div>
      <p style="color:var(--text-muted);font-size:0.82rem;text-align:center;">Use arrow keys or swipe to merge tiles!</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;border-top:1px solid var(--card-border);">
      <button class="btn btn-secondary" id="m-up"   style="width:54px;height:44px;">↑</button>
      <div style="display:flex;gap:6px;">
        <button class="btn btn-secondary" id="m-left"  style="width:54px;height:44px;">←</button>
        <button class="btn btn-secondary" id="m-down"  style="width:54px;height:44px;">↓</button>
        <button class="btn btn-secondary" id="m-right" style="width:54px;height:44px;">→</button>
      </div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🎮 Controls</h3>
      <ul>
        <li><span class="key-badge">↑↓←→</span> Slide tiles</li>
        <li><span class="key-badge">Swipe</span> On mobile</li>
        <li><span class="key-badge">R</span> New game</li>
      </ul>
    </div>
    <div class="info-card">
      <h3>📋 How to Win</h3>
      <p>Slide numbered tiles to merge matching numbers. Keep combining until you create the <strong style="color:var(--accent)">2048</strong> tile!</p>
    </div>
  </div>
</div>

<script>
let grid, score, best;
const LS_KEY = 'cgo_hs_2048';
const getB   = () => parseInt(localStorage.getItem(LS_KEY)||'0');
const setB   = v => { if(v>getB()) localStorage.setItem(LS_KEY,v); };

function newGame() {
  grid  = Array.from({length:4}, () => Array(4).fill(0));
  score = 0; best = getB();
  addTile(); addTile();
  render();
}

function addTile() {
  const empty = [];
  grid.forEach((row,r) => row.forEach((v,c) => { if(!v) empty.push([r,c]); }));
  if (!empty.length) return;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  grid[r][c]  = Math.random() < 0.9 ? 2 : 4;
}

function slide(row) {
  let arr = row.filter(v=>v), merged = false, pts = 0;
  for (let i = 0; i < arr.length-1; i++) {
    if (arr[i] === arr[i+1] && !merged) {
      arr[i] *= 2; pts += arr[i]; arr.splice(i+1,1); merged = true;
    } else { merged = false; }
  }
  while (arr.length < 4) arr.push(0);
  return { arr, pts };
}

function move(dir) {
  let moved = false, pts = 0;
  const rotate = g => g[0].map((_,c) => g.map(r=>r[c]).reverse());
  let g = JSON.parse(JSON.stringify(grid));
  if (dir==='right') g = g.map(r=>[...r].reverse());
  if (dir==='up')    g = rotate(rotate(rotate(g)));
  if (dir==='down')  g = rotate(g);

  g = g.map(row => {
    const {arr, pts:p} = slide(row);
    if (arr.join()!==row.join()) moved = true;
    pts += p;
    return arr;
  });

  if (dir==='right') g = g.map(r=>[...r].reverse());
  if (dir==='up')    g = rotate(g);
  if (dir==='down')  g = rotate(rotate(rotate(g)));

  if (moved) {
    grid  = g;
    score+= pts;
    if (score > best) { best = score; setB(score); }
    addTile(); render();
    if (isGameOver()) showOver();
  }
}

function isGameOver() {
  for (let r=0;r<4;r++) for(let c=0;c<4;c++) {
    if (!grid[r][c]) return false;
    if (c<3 && grid[r][c]===grid[r][c+1]) return false;
    if (r<3 && grid[r][c]===grid[r+1][c]) return false;
  }
  return true;
}

function showOver() {
  const b = document.getElementById('board');
  const d = document.createElement('div');
  d.style.cssText = 'position:absolute;inset:0;background:rgba(15,14,23,0.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;border-radius:12px;z-index:10;';
  d.innerHTML = `<div style="font-size:3rem">😵</div><div style="font-family:'Fredoka One',cursive;font-size:1.8rem">Game Over!</div><div style="color:var(--text-muted)">Score: <strong style="color:var(--accent)">${score}</strong></div><button class="btn btn-primary" onclick="this.closest('div').remove();newGame()">▶ Try Again</button>`;
  b.parentElement.style.position='relative';
  b.parentElement.appendChild(d);
}

function render() {
  const board = document.getElementById('board');
  board.innerHTML = '';
  grid.forEach(row => row.forEach(v => {
    const d = document.createElement('div');
    d.className = `tile t${Math.min(v,2048)}${v?'':' t0'}`;
    if(v) d.textContent = v;
    board.appendChild(d);
  }));
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent  = best;
}

document.addEventListener('keydown', e => {
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
  if (e.key.toLowerCase()==='r') newGame();
});

['up','down','left','right'].forEach(d => {
  document.getElementById(`m-${d}`).addEventListener('click',()=>move(d));
});
document.getElementById('btn-new').addEventListener('click', newGame);

// Touch swipe
let tx,ty;
document.getElementById('board').addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.getElementById('board').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.max(Math.abs(dx),Math.abs(dy))>30){
    if(Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
    else move(dy>0?'down':'up');
  }
},{passive:true});

newGame();
</script>
</body>
</html>
