<body>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🧱 Brick Breaker</h1>
      <button class="btn btn-primary" id="btn-start">▶ Start</button>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="score-label">Score</span><span class="score-value" id="score">0</span></div>
      <div class="score-item"><span class="score-label">Lives</span><span class="score-value" id="lives">❤️❤️❤️</span></div>
      <div class="score-item"><span class="score-label">Level</span><span class="score-value" id="level">1</span></div>
      <div class="score-item"><span class="score-label">Best</span><span class="score-value" id="best">0</span></div>
    </div>
    <div class="game-canvas-wrap">
      <canvas id="game-canvas" width="420" height="480" style="border:2px solid var(--card-border);border-radius:12px;cursor:none;"></canvas>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🎮 Controls</h3>
      <ul>
        <li><span class="key-badge">← →</span> Move paddle</li>
        <li><span class="key-badge">Mouse</span> Also moves paddle</li>
        <li><span class="key-badge">Space</span> Launch ball</li>
        <li><span class="key-badge">P</span> Pause</li>
      </ul>
    </div>
    <div class="info-card">
      <h3>💡 Tips</h3>
      <p>Hit the top bricks for more points! Aim for the sides to control the ball angle.</p>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game-canvas');
const ctx    = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const LS = 'cgo_hs_brick';
const getHS = () => parseInt(localStorage.getItem(LS)||'0');
const setHS = v => { if(v>getHS()) localStorage.setItem(LS,v); };

const BRICK_ROWS = 5, BRICK_COLS = 8, BRICK_H = 20, BRICK_PAD = 6, BRICK_TOP = 50;
const PADDLE_H = 12, BALL_R = 8;
const COLORS = ['#ff4757','#ffa502','#ffd32a','#2ed573','#1e90ff','#a55eea'];

let paddle, ball, bricks, score, lives, level, state, paused;

function init(lvl=1) {
  level = lvl;
  score = lvl===1 ? 0 : score;
  lives = 3;
  paused = false;
  state  = 'idle';
  const speed = 4 + lvl*0.5;
  ball   = { x:W/2, y:H-80, vx:speed*(Math.random()>0.5?1:-1), vy:-speed, r:BALL_R };
  paddle = { x:W/2-50, y:H-30, w:100 };
  buildBricks();
  document.getElementById('level').textContent = level;
  document.getElementById('best').textContent  = getHS();
}

function buildBricks() {
  bricks = [];
  const bw = (W - BRICK_PAD*(BRICK_COLS+1)) / BRICK_COLS;
  for (let r=0;r<BRICK_ROWS;r++) {
    for (let c=0;c<BRICK_COLS;c++) {
      bricks.push({
        x: BRICK_PAD + c*(bw+BRICK_PAD),
        y: BRICK_TOP + r*(BRICK_H+BRICK_PAD),
        w: bw, h: BRICK_H,
        color: COLORS[r % COLORS.length],
        pts: (BRICK_ROWS-r)*10,
        alive: true
      });
    }
  }
}

function update() {
  if (state!=='playing' || paused) return;
  ball.x += ball.vx; ball.y += ball.vy;

  // Wall bounce
  if (ball.x-ball.r < 0)  { ball.x=ball.r;  ball.vx=Math.abs(ball.vx); }
  if (ball.x+ball.r > W)  { ball.x=W-ball.r; ball.vx=-Math.abs(ball.vx); }
  if (ball.y-ball.r < 0)  { ball.y=ball.r;  ball.vy=Math.abs(ball.vy); }

  // Paddle
  if (
    ball.y+ball.r > paddle.y &&
    ball.x > paddle.x && ball.x < paddle.x+paddle.w &&
    ball.vy > 0
  ) {
    const hit = (ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
    const angle = hit * Math.PI/3;
    const sp = Math.hypot(ball.vx,ball.vy);
    ball.vx = sp*Math.sin(angle);
    ball.vy = -sp*Math.cos(angle);
    ball.y  = paddle.y - ball.r;
  }

  // Bricks
  bricks.forEach(b => {
    if (!b.alive) return;
    if (ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w && ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h) {
      b.alive = false;
      score  += b.pts;
      const overlapX = Math.min(ball.x+ball.r-b.x, b.x+b.w-ball.x+ball.r);
      const overlapY = Math.min(ball.y+ball.r-b.y, b.y+b.h-ball.y+ball.r);
      if (overlapX < overlapY) ball.vx=-ball.vx; else ball.vy=-ball.vy;
    }
  });

  // Fall
  if (ball.y-ball.r > H) {
    lives--;
    if (lives<=0) { state='dead'; setHS(score); }
    else { ball.x=W/2; ball.y=H-80; ball.vx=4*(Math.random()>0.5?1:-1); ball.vy=-4; state='idle'; }
  }

  // Win
  if (bricks.every(b=>!b.alive)) { init(level+1); state='playing'; }

  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = '❤️'.repeat(lives);
}

function draw() {
  ctx.fillStyle='#0f0e17'; ctx.fillRect(0,0,W,H);

  // Bricks
  bricks.forEach(b=>{
    if(!b.alive) return;
    ctx.fillStyle=b.color;
    roundRect(ctx,b.x,b.y,b.w,b.h,4); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.25)';
    roundRect(ctx,b.x,b.y,b.w,4,2); ctx.fill();
  });

  // Paddle
  const pg = ctx.createLinearGradient(paddle.x,paddle.y,paddle.x,paddle.y+PADDLE_H);
  pg.addColorStop(0,'#a55eea'); pg.addColorStop(1,'#7a3bb5');
  ctx.fillStyle=pg;
  roundRect(ctx,paddle.x,paddle.y,paddle.w,PADDLE_H,PADDLE_H/2); ctx.fill();

  // Ball
  const bg = ctx.createRadialGradient(ball.x-2,ball.y-2,1,ball.x,ball.y,ball.r);
  bg.addColorStop(0,'#fff'); bg.addColorStop(1,'#ffd32a');
  ctx.fillStyle=bg;
  ctx.beginPath(); ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();

  // Overlays
  if (state==='idle') {
    ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='white';
    ctx.font="bold 28px 'Fredoka One',cursive"; ctx.textAlign='center';
    ctx.fillText('Click or Space to Launch!',W/2,H/2);
  }
  if (state==='dead') {
    ctx.fillStyle='rgba(0,0,0,0.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#ff4757'; ctx.font="bold 40px 'Fredoka One',cursive"; ctx.textAlign='center';
    ctx.fillText('Game Over!',W/2,H/2-40);
    ctx.fillStyle='#ffa502'; ctx.font='24px Nunito,sans-serif';
    ctx.fillText(`Score: ${score}  Best: ${getHS()}`,W/2,H/2+10);
    ctx.fillStyle='rgba(255,255,255,0.7)'; ctx.font='16px Nunito,sans-serif';
    ctx.fillText('Click to restart',W/2,H/2+50);
  }
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

function launch() {
  if (state==='dead') { init(); return; }
  if (state==='idle') state='playing';
}

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  paddle.x = Math.max(0, Math.min(W-paddle.w, e.clientX-r.left-paddle.w/2));
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const r = canvas.getBoundingClientRect();
  paddle.x = Math.max(0, Math.min(W-paddle.w, e.touches[0].clientX-r.left-paddle.w/2));
}, {passive:false});
canvas.addEventListener('click', launch);
document.addEventListener('keydown', e=>{
  if(e.key===' '){e.preventDefault();launch();}
  if(e.key==='ArrowLeft')  paddle.x=Math.max(0,paddle.x-20);
  if(e.key==='ArrowRight') paddle.x=Math.min(W-paddle.w,paddle.x+20);
  if(e.key.toLowerCase()==='p') paused=!paused;
  if(e.key.toLowerCase()==='r') init();
});
document.getElementById('btn-start').addEventListener('click',()=>{if(state==='dead')init();else launch();});

init(); gameLoop();
</script>
</body>
