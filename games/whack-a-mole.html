<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Whack-A-Mole — Crazy Game Online</title>
  <meta name="description" content="Play Whack-A-Mole online! Hit the moles as fast as they appear. Fun action game for kids."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔨</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .wam-grid { display:grid;grid-template-columns:repeat(3,1fr);gap:16px;padding:20px;max-width:420px;margin:0 auto; }
    .hole { aspect-ratio:1;background:var(--dark2);border-radius:50%;border:3px solid var(--card-border);display:flex;align-items:center;justify-content:center;font-size:2.5rem;cursor:pointer;position:relative;overflow:hidden;transition:transform 0.1s;user-select:none; }
    .hole:active { transform:scale(0.93); }
    .mole { position:absolute;bottom:-100%;transition:bottom 0.2s ease;font-size:2.5rem;line-height:1;pointer-events:none; }
    .hole.up .mole { bottom:0; }
    .hole.whacked .mole { bottom:-100%;transition:bottom 0.1s; }
    .hole.whacked::after { content:'💥';position:absolute;font-size:2.5rem;animation:pop 0.3s ease forwards; }
    .timer-bar { height:6px;background:var(--primary);border-radius:3px;transition:width 0.1s linear; }
  </style>
</head>
<body>

<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🔨 Whack-A-Mole</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🔨 Whack-A-Mole</h1>
      <button class="btn btn-primary" id="btn-start">▶ Start</button>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="score-label">Score</span><span class="score-value" id="score">0</span></div>
      <div class="score-item"><span class="score-label">Missed</span><span class="score-value" id="missed" style="color:var(--primary)">0</span></div>
      <div class="score-item"><span class="score-label">Time</span><span class="score-value" id="timer">30</span></div>
      <div class="score-item" style="margin-left:auto;">
        <div class="difficulty-btns">
          <button class="diff-btn active" data-diff="easy">Easy</button>
          <button class="diff-btn" data-diff="medium">Medium</button>
          <button class="diff-btn" data-diff="hard">Hard</button>
        </div>
      </div>
    </div>
    <div style="padding:0 16px;"><div class="timer-bar" id="timer-bar" style="width:100%"></div></div>
    <div class="game-canvas-wrap">
      <div class="wam-grid" id="wam-grid">
        <!-- 9 holes -->
        <div class="hole" data-i="0"><div class="mole">🐭</div></div>
        <div class="hole" data-i="1"><div class="mole">🐭</div></div>
        <div class="hole" data-i="2"><div class="mole">🐭</div></div>
        <div class="hole" data-i="3"><div class="mole">🐭</div></div>
        <div class="hole" data-i="4"><div class="mole">🐭</div></div>
        <div class="hole" data-i="5"><div class="mole">🐭</div></div>
        <div class="hole" data-i="6"><div class="mole">🐭</div></div>
        <div class="hole" data-i="7"><div class="mole">🐭</div></div>
        <div class="hole" data-i="8"><div class="mole">🐭</div></div>
      </div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🎮 How to Play</h3>
      <p>Click the moles when they pop up! Each hit scores a point. Miss and you lose a point!</p>
    </div>
    <div class="info-card">
      <h3>🐭 Mole Types</h3>
      <ul>
        <li><span>🐭</span> Normal mole (+1)</li>
        <li><span>💎</span> Golden mole (+3)</li>
        <li><span>💣</span> Bomb — DON'T hit! (-2)</li>
      </ul>
    </div>
    <div class="info-card">
      <h3>🏆 High Score</h3>
      <p style="font-family:'Fredoka One',cursive;font-size:2rem;color:var(--accent);text-align:center;" id="hs-display">0</p>
    </div>
  </div>
</div>

<script>
const DIFF = {
  easy:   { minTime:900, maxTime:1400, gameTime:30 },
  medium: { minTime:600, maxTime:1000, gameTime:30 },
  hard:   { minTime:400, maxTime:700,  gameTime:30 },
};
let diff = 'easy', score = 0, missed = 0, timeLeft = 30;
let gameRunning = false, loops = [], timerID;
const TYPES = ['🐭','🐭','🐭','🐭','💎','💣'];
const LS = 'cgo_hs_wam';
const getHS = () => parseInt(localStorage.getItem(LS)||'0');
const setHS = v => { if(v>getHS()) localStorage.setItem(LS,v); };

const holes = Array.from(document.querySelectorAll('.hole'));

function startGame() {
  if (gameRunning) { endGame(); return; }
  score=0; missed=0;
  timeLeft = DIFF[diff].gameTime;
  gameRunning = true;
  document.getElementById('btn-start').textContent = '⏹ Stop';
  holes.forEach(h=>h.classList.remove('up','whacked'));
  updateUI();
  holes.forEach((_,i)=>scheduleMole(i));
  timerID = setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    document.getElementById('timer-bar').style.width = (timeLeft/DIFF[diff].gameTime*100)+'%';
    if(timeLeft<=0) endGame();
  },1000);
}

function scheduleMole(idx) {
  if (!gameRunning) return;
  const d = DIFF[diff];
  const delay = Math.random()*(d.maxTime-d.minTime)+d.minTime;
  const t = setTimeout(()=>{
    if (!gameRunning) return;
    const h    = holes[idx];
    const type = TYPES[Math.floor(Math.random()*TYPES.length)];
    h.querySelector('.mole').textContent = type;
    h.classList.remove('whacked');
    h.classList.add('up');
    h.dataset.type = type;
    const hideT = setTimeout(()=>{
      if (h.classList.contains('up') && !h.classList.contains('whacked')) {
        missed++;
        if(type!=='💣') score = Math.max(0,score-1);
        updateUI();
      }
      h.classList.remove('up','whacked');
      scheduleMole(idx);
    }, delay);
    loops.push(hideT);
  }, delay);
  loops.push(t);
}

function onWhack(e) {
  const h = e.currentTarget;
  if (!gameRunning || !h.classList.contains('up') || h.classList.contains('whacked')) return;
  h.classList.add('whacked');
  const type = h.dataset.type;
  if (type==='💣') { score=Math.max(0,score-2); }
  else if (type==='💎') { score+=3; }
  else { score+=1; }
  updateUI();
}

function endGame() {
  gameRunning = false;
  clearInterval(timerID);
  loops.forEach(clearTimeout); loops=[];
  holes.forEach(h=>h.classList.remove('up','whacked'));
  setHS(score);
  document.getElementById('btn-start').textContent = '▶ Start';
  document.getElementById('hs-display').textContent = getHS();
  alert(`Game Over! Score: ${score}\nHigh Score: ${getHS()}`);
}

function updateUI() {
  document.getElementById('score').textContent  = score;
  document.getElementById('missed').textContent = missed;
  document.getElementById('hs-display').textContent = getHS();
}

holes.forEach(h=>h.addEventListener('click',onWhack));
document.getElementById('btn-start').addEventListener('click',startGame);
document.querySelectorAll('[data-diff]').forEach(b=>b.addEventListener('click',()=>{
  document.querySelectorAll('[data-diff]').forEach(x=>x.classList.remove('active'));
  b.classList.add('active'); diff=b.dataset.diff;
}));

document.getElementById('hs-display').textContent = getHS();
</script>
</body>
</html>
