<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Battleship — Crazy Game Online</title>
  <meta name="description" content="Play Battleship online! Place your fleet and sink the enemy ships. Classic naval strategy game."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚢</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .bs-grid { display:grid;grid-template-columns:repeat(10,1fr);gap:3px;max-width:340px;margin:0 auto; }
    .bs-cell { aspect-ratio:1;border-radius:4px;border:1px solid var(--card-border);background:var(--dark2);cursor:pointer;transition:all 0.15s;display:flex;align-items:center;justify-content:center;font-size:0.9rem; }
    .bs-cell.ship   { background:#2d5016; }
    .bs-cell.hit    { background:var(--primary);cursor:default; }
    .bs-cell.miss   { background:#1a2a4a;cursor:default; }
    .bs-cell.sunk   { background:#8b0000; }
    .bs-cell:hover:not(.hit):not(.miss):not(.sunk) { border-color:var(--primary);background:rgba(255,71,87,0.1); }
    .bs-cell.preview { background:rgba(46,213,115,0.3); }
    .bs-cell.invalid { background:rgba(255,71,87,0.3); }
    .ship-list { display:flex;flex-direction:column;gap:8px; }
    .ship-item { display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;cursor:pointer;border:2px solid var(--card-border);background:var(--dark2);transition:all 0.2s; }
    .ship-item.selected { border-color:var(--primary);background:rgba(255,71,87,0.1); }
    .ship-item.placed   { opacity:0.5;cursor:default; }
    .ship-dots { display:flex;gap:3px; }
    .ship-dot  { width:14px;height:14px;background:var(--secondary);border-radius:3px; }
    .phases { display:flex;flex-direction:column;gap:16px;width:100%;align-items:center; }
    .phase-label { font-family:'Fredoka One',cursive;font-size:1.1rem;color:var(--accent);text-align:center; }
  </style>
</head>
<body>
<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🚢 Battleship</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🚢 Battleship</h1>
      <div class="game-controls-bar">
        <button class="btn btn-secondary" id="btn-rotate">↻ Rotate</button>
        <button class="btn btn-primary" id="btn-action">▶ Ready</button>
      </div>
    </div>
    <div class="score-bar">
      <div class="score-item"><span class="score-label">Turn</span><span class="score-value" id="turn-label">Player 1</span></div>
      <div class="score-item"><span class="score-label">Phase</span><span class="score-value" id="phase-label" style="font-size:0.9rem;">Placement</span></div>
      <div class="score-item"><span class="score-label">Hits</span><span class="score-value" id="hits" style="color:var(--primary)">0</span></div>
    </div>
    <div class="game-canvas-wrap" style="flex-direction:column;gap:16px;width:100%;">
      <div class="phases" id="phases">
        <div class="phase-label" id="phase-msg">🚢 Player 1: Place your ships</div>
        <div class="bs-grid" id="grid"></div>
      </div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🚢 Your Fleet</h3>
      <div class="ship-list" id="ship-list"></div>
    </div>
    <div class="info-card">
      <h3>📋 How to Play</h3>
      <p>Place your ships, then take turns firing at your opponent's grid. First to sink all enemy ships wins!</p>
    </div>
  </div>
</div>

<script>
const SHIPS = [
  {name:'Carrier',    size:5, emoji:'🛸'},
  {name:'Battleship', size:4, emoji:'🚢'},
  {name:'Cruiser',    size:3, emoji:'🚤'},
  {name:'Submarine',  size:3, emoji:'🤿'},
  {name:'Destroyer',  size:2, emoji:'⛵'},
];

let players, phase, currentPlayer, shipIdx, horizontal;

function createPlayer() {
  return {
    grid:    Array.from({length:10},()=>Array(10).fill(null)),
    shots:   Array.from({length:10},()=>Array(10).fill(false)),
    placed:  [], // [{r,c,size,h}]
    hits:    0,
  };
}

function init() {
  players = [createPlayer(), createPlayer()];
  phase   = 'place'; // place | attack | gameover
  currentPlayer = 0;
  shipIdx = 0;
  horizontal = true;
  renderShipList();
  renderGrid();
  updateUI();
  document.getElementById('btn-action').style.display = 'none';
  document.getElementById('btn-rotate').style.display = '';
}

function renderShipList() {
  const list = document.getElementById('ship-list');
  list.innerHTML = SHIPS.map((s,i) => `
    <div class="ship-item${i===shipIdx?' selected':''}${players[currentPlayer].placed[i]?' placed':''}" data-i="${i}">
      <span>${s.emoji}</span>
      <span style="flex:1;font-weight:700;font-size:0.88rem">${s.name}</span>
      <div class="ship-dots">${Array(s.size).fill('<div class="ship-dot"></div>').join('')}</div>
    </div>
  `).join('');
  list.querySelectorAll('.ship-item:not(.placed)').forEach(el => el.addEventListener('click', () => {
    shipIdx = parseInt(el.dataset.i);
    renderShipList();
    renderGrid();
  }));
}

function placeShip(r, c) {
  if (phase !== 'place') return;
  const ship = SHIPS[shipIdx];
  const p = players[currentPlayer];
  if (p.placed[shipIdx]) return;
  if (!canPlace(p.grid, r, c, ship.size, horizontal)) return;

  for (let i = 0; i < ship.size; i++) {
    const nr = horizontal ? r : r+i;
    const nc = horizontal ? c+i : c;
    p.grid[nr][nc] = shipIdx;
  }
  p.placed[shipIdx] = { r, c, size: ship.size, h: horizontal };

  // Next ship
  const nextIdx = SHIPS.findIndex((_, i) => !p.placed[i]);
  if (nextIdx === -1) {
    // All ships placed
    document.getElementById('btn-action').style.display = '';
    document.getElementById('btn-action').textContent = currentPlayer === 0 ? '✅ Player 1 Ready → Hand off to P2' : '⚔️ Start Battle!';
    shipIdx = 0;
  } else {
    shipIdx = nextIdx;
  }
  renderShipList();
  renderGrid();
}

function canPlace(grid, r, c, size, h) {
  for (let i = 0; i < size; i++) {
    const nr = h ? r : r+i, nc = h ? c+i : c;
    if (nr < 0||nr >= 10||nc < 0||nc >= 10) return false;
    if (grid[nr][nc] !== null) return false;
    // check adjacent
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
      const ar = nr+dr, ac = nc+dc;
      if (ar>=0&&ar<10&&ac>=0&&ac<10&&grid[ar][ac]!==null) return false;
    }
  }
  return true;
}

function fire(r, c) {
  if (phase !== 'attack') return;
  const attacker = players[currentPlayer];
  const defender = players[1 - currentPlayer];
  if (attacker.shots[r][c]) return;
  attacker.shots[r][c] = true;

  if (defender.grid[r][c] !== null) {
    attacker.hits++;
    document.getElementById('hits').textContent = attacker.hits;
    // Check if ship sunk
    const si = defender.grid[r][c];
    const ship = defender.placed[si];
    if (ship) {
      const allHit = Array.from({length:ship.size},(_, i)=>{
        const nr = ship.h?ship.r:ship.r+i, nc = ship.h?ship.c+i:ship.c;
        return attacker.shots[nr][nc];
      }).every(Boolean);
      if (allHit) {
        // Mark as sunk
        for (let i = 0; i < ship.size; i++) {
          const nr = ship.h?ship.r:ship.r+i, nc = ship.h?ship.c+i:ship.c;
          // sunk visually tracked in render
        }
      }
    }
    // Check win
    const totalShipCells = SHIPS.reduce((a,s)=>a+s.size,0);
    if (attacker.hits >= totalShipCells) { endGame(); return; }
  }

  currentPlayer = 1 - currentPlayer;
  document.getElementById('hits').textContent = 0;
  showHandoff();
}

function showHandoff() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,14,23,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;';
  overlay.innerHTML = `
    <div style="font-size:3rem">🫳</div>
    <div style="font-family:'Fredoka One',cursive;font-size:1.8rem">Hand off to Player ${currentPlayer+1}!</div>
    <p style="color:var(--text-muted)">Don't let them see your board!</p>
    <button class="btn btn-primary" id="handoff-ok">✅ I'm Player ${currentPlayer+1} — Show My Turn</button>`;
  document.body.appendChild(overlay);
  document.getElementById('handoff-ok').addEventListener('click', () => {
    overlay.remove();
    updateUI();
    renderGrid();
    document.getElementById('hits').textContent = players[currentPlayer].hits;
  });
}

function endGame() {
  phase = 'gameover';
  alert(`🎉 Player ${currentPlayer+1} wins! All enemy ships sunk!`);
}

function renderGrid() {
  const grid   = document.getElementById('grid');
  const p      = players[currentPlayer];
  const isAttack = phase === 'attack';
  const attacker = isAttack ? p : null;
  const defender = isAttack ? players[1-currentPlayer] : null;
  let hoverR = -1, hoverC = -1;

  grid.innerHTML = '';
  for (let r = 0; r < 10; r++) {
    for (let c = 0; c < 10; c++) {
      const cell = document.createElement('div');
      cell.className = 'bs-cell';
      cell.dataset.r = r; cell.dataset.c = c;

      if (isAttack) {
        const shot = attacker.shots[r][c];
        const hit  = shot && defender.grid[r][c] !== null;
        if (shot) cell.classList.add(hit ? 'hit' : 'miss');
        cell.textContent = shot ? (hit ? '💥' : '•') : '';
        cell.addEventListener('click', () => fire(r, c));
      } else {
        if (p.grid[r][c] !== null) {
          cell.classList.add('ship');
          cell.textContent = SHIPS[p.grid[r][c]].emoji;
        }
        cell.addEventListener('mouseenter', () => showPreview(r, c));
        cell.addEventListener('mouseleave', clearPreview);
        cell.addEventListener('click', () => placeShip(r, c));
      }
      grid.appendChild(cell);
    }
  }
}

function showPreview(r, c) {
  if (phase !== 'place' || players[currentPlayer].placed[shipIdx]) return;
  clearPreview();
  const size = SHIPS[shipIdx].size;
  const p = players[currentPlayer];
  for (let i = 0; i < size; i++) {
    const nr = horizontal ? r : r+i, nc = horizontal ? c+i : c;
    if (nr < 0||nr >= 10||nc < 0||nc >= 10) continue;
    const el = document.querySelector(`[data-r="${nr}"][data-c="${nc}"]`);
    if (el) el.classList.add(canPlace(p.grid, r, c, size, horizontal) ? 'preview' : 'invalid');
  }
}

function clearPreview() {
  document.querySelectorAll('.preview,.invalid').forEach(el => el.classList.remove('preview','invalid'));
}

function updateUI() {
  const name = `Player ${currentPlayer+1}`;
  document.getElementById('turn-label').textContent  = name;
  document.getElementById('phase-label').textContent = phase === 'attack' ? 'Battle!' : 'Placement';
  document.getElementById('phase-msg').textContent   = phase === 'attack'
    ? `💥 ${name}: Fire at the enemy!`
    : `🚢 ${name}: Place your ships`;
}

document.getElementById('btn-rotate').addEventListener('click', () => { horizontal = !horizontal; });

document.getElementById('btn-action').addEventListener('click', () => {
  if (currentPlayer === 0) {
    // Show handoff screen before P2 places
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(15,14,23,0.97);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:200;';
    overlay.innerHTML = `<div style="font-size:3rem">🫳</div><div style="font-family:'Fredoka One',cursive;font-size:1.8rem">Hand off to Player 2!</div><button class="btn btn-primary" id="p2-ok">✅ I'm Player 2 — Show My Board</button>`;
    document.body.appendChild(overlay);
    document.getElementById('p2-ok').addEventListener('click', () => {
      overlay.remove();
      currentPlayer = 1; shipIdx = 0;
      renderShipList(); renderGrid(); updateUI();
      document.getElementById('btn-action').style.display = 'none';
    });
  } else {
    // Both placed — start battle
    phase = 'attack'; currentPlayer = 0;
    document.getElementById('btn-action').style.display = 'none';
    document.getElementById('btn-rotate').style.display = 'none';
    document.getElementById('ship-list').innerHTML = '<p style="color:var(--text-muted);font-size:0.88rem">Hit 💥 or Miss •</p>';
    showHandoff();
  }
});

init();
</script>
</body>
</html>
