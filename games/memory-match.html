<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Memory Match — Crazy Game Online</title>
  <meta name="description" content="Play Memory Match! Flip cards and find matching pairs. Free brain game."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🃏</text></svg>"/>
  <link rel="stylesheet" href="../css/game.css"/>
  <style>
    .mem-wrap {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 20px;
    }

    .mem-grid {
      display: grid;
      gap: 10px;
      width: 100%;
      max-width: 520px;
    }

    .mem-grid.g4 { grid-template-columns: repeat(4, 1fr); }
    .mem-grid.g6 { grid-template-columns: repeat(6, 1fr); }

    /* 3D flip card */
    .card-wrap {
      perspective: 700px;
      cursor: pointer;
    }

    /* Keep cards square — use padding-bottom trick */
    .card-outer {
      position: relative;
      width: 100%;
      padding-bottom: 100%;
    }

    .card-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
      border-radius: 14px;
    }

    .card-wrap.flipped .card-inner,
    .card-wrap.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255,255,255,0.7);
      box-shadow: 0 4px 14px rgba(108,99,255,0.12);
      transition: all 0.2s;
    }

    /* Back face */
    .card-back {
      background: linear-gradient(135deg, #6c63ff, #4f46e5);
      font-size: 1.8rem;
    }

    .card-back::before {
      content: '?';
      font-family: 'Sora', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: rgba(255,255,255,0.4);
    }

    /* Front face */
    .card-front {
      transform: rotateY(180deg);
      background: white;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
    }

    .card-wrap.matched .card-face.card-front {
      background: var(--green-light);
      border-color: var(--green);
      box-shadow: 0 4px 16px rgba(16,185,129,0.25);
    }

    .card-wrap:not(.flipped):not(.matched):hover .card-inner {
      transform: rotateY(10deg) scale(1.04);
    }

    /* Result message */
    .result-msg {
      text-align: center;
      padding: 20px;
      animation: fadeIn 0.4s ease;
    }
  </style>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Memory Match",
    "description": "Flip cards and find matching pairs. Train your brain and beat the clock! Free memory game online.",
    "url": "https://brousee.github.io/crazy-game-online/games/memory-match.html",
    "genre": ["Puzzle", "Brain"],
    "numberOfPlayers": {
      "@type": "QuantitativeValue",
      "minValue": 1,
      "maxValue": 1
    },
    "gamePlatform": "Web Browser",
    "applicationCategory": "Game",
    "operatingSystem": "Any",
    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "USD"
    },
    "publisher": {
      "@type": "Organization",
      "name": "Crazy Game Online",
      "url": "https://brousee.github.io/crazy-game-online/"
    }
  }
  </script>
</head>
<body>

<nav class="game-nav">
  <div class="game-nav-inner">
    <a href="../index.html" class="back-btn">← Back</a>
    <span class="game-nav-title">🃏 Memory Match</span>
    <a href="../index.html" class="game-nav-logo">🎮 CGO</a>
  </div>
</nav>

<div class="game-wrapper">
  <div class="game-stage">
    <div class="game-header">
      <h1 class="game-title">🃏 Memory Match</h1>
      <div class="game-controls-bar">
        <button class="btn btn-primary" id="btn-new">🔄 New Game</button>
      </div>
    </div>

    <div class="score-bar">
      <div class="score-item">
        <span class="score-label">Moves</span>
        <span class="score-value" id="moves">0</span>
      </div>
      <div class="score-item">
        <span class="score-label">Pairs</span>
        <span class="score-value" id="pairs">0 / 8</span>
      </div>
      <div class="score-item">
        <span class="score-label">Time</span>
        <span class="score-value" id="timer">0:00</span>
      </div>
      <div class="score-item">
        <div class="difficulty-btns">
          <button class="diff-btn active" data-size="4">4×4</button>
          <button class="diff-btn" data-size="6">6×6</button>
        </div>
      </div>
    </div>

    <div class="game-canvas-wrap" style="padding:0; align-items:stretch; background:var(--bg);">
      <div class="mem-wrap">
        <div class="mem-grid g4" id="mem-grid"></div>
        <div id="result-area"></div>
      </div>
    </div>
  </div>

  <div class="game-info-panel">
    <div class="info-card">
      <h3>🎮 How to Play</h3>
      <p>Click any card to flip it. Find both matching cards to make a pair. Match all pairs to win!</p>
    </div>
    <div class="info-card">
      <h3>💡 Tips</h3>
      <p>Remember where each emoji was. Start from corners and work your way inward!</p>
    </div>
    <div class="info-card">
      <h3>🏆 Best (4×4)</h3>
      <p style="font-family:'Sora',sans-serif;font-size:1.8rem;color:var(--primary);text-align:center;" id="hs-display">-- moves</p>
    </div>
  </div>
</div>

<script>
const EMOJIS_16 = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐸','🐵','🐔','🐧'];
const EMOJIS_36 = [...EMOJIS_16,'🐦','🐝','🐛','🦋','🐌','🐞','🦀','🦑','🐙','🦈','🐬','🐳','🦓','🦒','🦘','🦔','🐿️','🦡'];

let size = 4, moves = 0, pairs = 0;
let flipped = [], locked = false;
let timerID, seconds = 0, started = false;

const LS = 'cgo_hs_memory4';
const getHS = () => localStorage.getItem(LS) || '--';
const setHS = v => { const c=getHS(); if(c==='--'||v<parseInt(c)) localStorage.setItem(LS,v); };

function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function newGame() {
  clearInterval(timerID);
  moves=0; pairs=0; flipped=[]; locked=false; seconds=0; started=false;
  const total = size * size;
  const pool  = (size===4 ? EMOJIS_16 : EMOJIS_36).slice(0, total/2);
  const cards = shuffle([...pool, ...pool]);

  const grid  = document.getElementById('mem-grid');
  grid.className = `mem-grid g${size}`;
  grid.innerHTML = cards.map((e,i) => `
    <div class="card-wrap" data-idx="${i}" data-emoji="${e}">
      <div class="card-outer">
        <div class="card-inner">
          <div class="card-face card-back"></div>
          <div class="card-face card-front">${e}</div>
        </div>
      </div>
    </div>
  `).join('');

  grid.querySelectorAll('.card-wrap').forEach(c => c.addEventListener('click', onCard));
  document.getElementById('result-area').innerHTML = '';
  updateUI();
  document.getElementById('hs-display').textContent = getHS()==='--' ? '-- moves' : getHS()+' moves';
}

function onCard(e) {
  const card = e.currentTarget;
  if (locked || card.classList.contains('flipped') || card.classList.contains('matched')) return;

  // Start timer on first flip
  if (!started) {
    started = true;
    timerID = setInterval(() => { seconds++; updateTimer(); }, 1000);
  }

  card.classList.add('flipped');
  flipped.push(card);

  if (flipped.length === 2) {
    moves++;
    locked = true;

    if (flipped[0].dataset.emoji === flipped[1].dataset.emoji) {
      // Match!
      flipped.forEach(c => c.classList.add('matched'));
      pairs++;
      flipped = []; locked = false;
      updateUI();
      if (pairs === (size*size)/2) winGame();
    } else {
      // No match — flip back
      setTimeout(() => {
        flipped.forEach(c => c.classList.remove('flipped'));
        flipped = []; locked = false;
      }, 1000);
      updateUI();
    }
  }
}

function winGame() {
  clearInterval(timerID);
  if (size === 4) setHS(moves);
  document.getElementById('result-area').innerHTML = `
    <div class="result-msg">
      <div style="font-size:2.5rem;margin-bottom:10px">🎉</div>
      <div style="font-family:'Sora',sans-serif;font-size:1.5rem;font-weight:800;color:var(--text);margin-bottom:8px">You Win!</div>
      <div style="color:var(--text-muted);margin-bottom:16px">${moves} moves · ${formatTime(seconds)}</div>
      <button class="btn btn-primary" onclick="newGame()">▶ Play Again</button>
    </div>`;
  document.getElementById('hs-display').textContent = getHS()==='--'?'-- moves':getHS()+' moves';
}

function updateTimer() {
  document.getElementById('timer').textContent = formatTime(seconds);
}

function formatTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function updateUI() {
  document.getElementById('moves').textContent = moves;
  document.getElementById('pairs').textContent = `${pairs} / ${(size*size)/2}`;
}

document.querySelectorAll('[data-size]').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('[data-size]').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  size = parseInt(b.dataset.size);
  newGame();
}));

document.getElementById('btn-new').addEventListener('click', newGame);
newGame();
</script>
</body>
</html>
